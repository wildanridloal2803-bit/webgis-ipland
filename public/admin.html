<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Manajemen Data | WebGIS IPLand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-emerald-800 text-white flex flex-col">
        <div class="p-6 border-b border-emerald-700">
            <h1 class="text-2xl font-bold tracking-wider">IP<span class="text-emerald-400">Land</span></h1>
        </div>
        <nav class="flex-1 p-4">
            <a href="index.html" class="block py-2.5 px-4 rounded hover:bg-emerald-700 mb-2 transition">Dashboard Peta</a>
            <a href="admin.html" class="block py-2.5 px-4 rounded bg-emerald-700 transition">Manajemen Data</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <h2 class="text-xl font-semibold">Manajemen Data Hunian</h2>
            <button onclick="openModal()" class="bg-emerald-600 text-white px-4 py-2 rounded shadow hover:bg-emerald-700 transition">+ Tambah Data</button>
        </header>

        <div class="flex-1 p-6 overflow-y-auto">
            <!-- Tabel Data -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100 text-slate-500 text-sm">
                            <th class="p-4">Tipe Hunian</th>
                            <th class="p-4">Harga</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data akan dimuat melalui Vanilla JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form CRUD (Hidden default) -->
    <div id="crud-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-3xl rounded-xl shadow-xl flex overflow-hidden">
            
            <!-- Kolom Form (Kiri) -->
            <div class="w-1/2 p-6">
                <h3 id="modal-title" class="text-lg font-bold mb-4">Tambah Hunian</h3>
                <form id="crud-form">
                    <input type="hidden" id="form-id">
                    <div class="mb-3">
                        <label class="block text-sm text-slate-600 mb-1">Nama / Tipe</label>
                        <input type="text" id="form-nama" class="w-full border rounded p-2 outline-none focus:border-emerald-500" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm text-slate-600 mb-1">Harga (Rp)</label>
                        <input type="number" id="form-harga" class="w-full border rounded p-2 outline-none focus:border-emerald-500" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm text-slate-600 mb-1">Status</label>
                        <select id="form-status" class="w-full border rounded p-2 outline-none focus:border-emerald-500">
                            <option value="Tersedia">Tersedia</option>
                            <option value="Booking">Booking</option>
                            <option value="Terjual">Terjual</option>
                        </select>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <div class="w-1/2">
                            <label class="block text-sm text-slate-600 mb-1">Latitude</label>
                            <input type="text" id="form-lat" class="w-full border rounded p-2 text-sm bg-slate-50" readonly required>
                        </div>
                        <div class="w-1/2">
                            <label class="block text-sm text-slate-600 mb-1">Longitude</label>
                            <input type="text" id="form-lng" class="w-full border rounded p-2 text-sm bg-slate-50" readonly required>
                        </div>
                    </div>
                    <div class="flex justify-end gap-2 mt-6">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded text-slate-600 hover:bg-slate-50">Batal</button>
                        <button type="submit" class="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700">Simpan</button>
                    </div>
                </form>
            </div>

            <!-- Kolom Peta (Kanan) -->
            <div class="w-1/2 bg-slate-100 relative">
                <div class="absolute top-2 left-2 z-[400] bg-white text-xs px-2 py-1 rounded shadow pointer-events-none">
                    Klik pada peta untuk set koordinat
                </div>
                <div id="form-map" class="w-full h-full"></div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="admin.js"></script>
</body>
</html>
