<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | PT IPLand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center selection:bg-emerald-200">

    <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border border-slate-100 transform transition-all">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-lg shadow-emerald-500/30 mx-auto mb-4">
                IP
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Login Admin</h1>
            <p class="text-sm text-slate-500 mt-1">Sistem WebGIS PT IPLand</p>
        </div>

        <!-- Form Notifikasi Error -->
        <div id="error-alert" class="hidden bg-rose-50 border border-rose-200 text-rose-600 px-4 py-3 rounded-xl text-sm mb-4 text-center">
            Username atau password salah!
        </div>

        <!-- Form Login -->
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-3.5 text-slate-400"></i>
                    <input type="text" id="username" class="w-full border border-slate-300 rounded-xl py-3 pl-10 pr-4 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="Masukkan username..." required>
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-3.5 text-slate-400"></i>
                    <input type="password" id="password" class="w-full border border-slate-300 rounded-xl py-3 pl-10 pr-4 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" id="btn-login" class="w-full py-3 rounded-xl font-semibold bg-emerald-600 text-white shadow-md hover:bg-emerald-700 transition-all flex justify-center items-center gap-2 mt-6">
                Masuk ke Dashboard <i class="fas fa-arrow-right text-sm"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-login');
            const alert = document.getElementById('error-alert');
            
            const usernameVal = document.getElementById('username').value;
            const passwordVal = document.getElementById('password').value;

            // Loading state
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memeriksa...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameVal, password: passwordVal })
                });

                const result = await response.json();

                if(result.success) {
                    // Simpan token ke localStorage
                    localStorage.setItem('adminToken', result.token);
                    // Pindah ke halaman dashboard
                    window.location.href = '/dashboard';
                } else {
                    // Tampilkan error
                    alert.classList.remove('hidden');
                    btn.innerHTML = 'Masuk ke Dashboard <i class="fas fa-arrow-right text-sm"></i>';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                alert.innerText = "Terjadi kesalahan server!";
                alert.classList.remove('hidden');
                btn.innerHTML = 'Masuk ke Dashboard <i class="fas fa-arrow-right text-sm"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
